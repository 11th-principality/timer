<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちいさい春木大佐たちのタイマー部屋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --ink:      #1a1a2e;
            --parchment:#faf7f2;
            --warm-mid: #e8e0d4;
            --accent:   #c97b4b;
            --accent-lt:#f0c49a;
            --teal:     #3d8b85;
            --teal-lt:  #a8d4d1;
            --muted:    #8a7f75;
            --radius-lg:18px;
            --radius-md:10px;
            --shadow:   0 8px 32px rgba(26,26,46,.12);
            --shadow-sm:0 2px 8px  rgba(26,26,46,.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--parchment);
            /* 細かい和紙テクスチャ風グラデ */
            background-image:
                radial-gradient(ellipse at 20% 10%, #eedfd0 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, #d4e8e6 0%, transparent 55%);
            font-family: 'Zen Maru Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* ===== LAYOUT ===== */
        .main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 900px;
            width: 100%;
        }

        /* ===== STAGE ===== */
        .stage-container {
            width: 340px;
            height: 540px;
            background-image: url('background_day.png');
            background-size: cover;
            background-position: center;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,.7);
            flex-shrink: 0;
        }
        /* 舞台の薄いビネット */
        .stage-container::after {
            content:'';
            position:absolute; inset:0;
            border-radius: var(--radius-lg);
            box-shadow: inset 0 0 60px rgba(26,26,46,.18);
            pointer-events:none;
            z-index:2;
        }

        .window-overlay {
            position:absolute; inset:0;
            pointer-events:none; z-index:1;
            mix-blend-mode:multiply; opacity:0;
            transition: opacity 1s ease;
        }
        .window-overlay.rain   { background:rgba(0,15,30,.25);  opacity:1; }
        .window-overlay.forest { background:rgba(10,40,10,.15); opacity:1; }

        /* ===== CHARACTERS ===== */
        .character {
            width:95px; height:95px;
            background-size:contain;
            background-repeat:no-repeat;
            background-position:bottom center;
            position:absolute;
            cursor:grab;
            user-select:none;
            z-index:10;
        }
        .character:active { cursor:grabbing; }

        @keyframes sleepZzz {
            0%  { opacity:0; transform:translateY(0) scale(.6); }
            50% { opacity:1; }
            100%{ opacity:0; transform:translateY(-20px) scale(1); }
        }
        .character.sleep::after {
            content:'💤';
            position:absolute; top:-10px; right:10px;
            font-size:16px;
            animation:sleepZzz 2s infinite ease-in-out;
        }

        .speech-bubble {
            position:absolute;
            background:rgba(255,255,255,.95);
            border:1.5px solid var(--warm-mid);
            border-radius:8px;
            padding:4px 9px;
            font-size:11px; font-weight:700;
            color:var(--ink);
            box-shadow:var(--shadow-sm);
            display:none; z-index:30;
            white-space:nowrap; pointer-events:none;
        }
        .speech-bubble::after {
            content:'';
            position:absolute; bottom:-5px; left:50%;
            transform:translateX(-50%);
            border-width:5px 5px 0;
            border-style:solid;
            border-color:rgba(255,255,255,.95) transparent;
            display:block; width:0;
        }

        @keyframes pyon {
            0%  { bottom:var(--pyon-base); }
            35% { bottom:calc(var(--pyon-base) + 25px); }
            65% { bottom:calc(var(--pyon-base) + 25px); }
            100%{ bottom:var(--pyon-base); }
        }
        .pyon { animation:pyon .45s ease-in-out forwards; }

        @keyframes typing {
            0%,100%{ transform:scaleX(var(--chara-dir)) scale(var(--chara-scale)) translateY(0); }
            50%    { transform:scaleX(var(--chara-dir)) scale(var(--chara-scale)) translateY(-4px); }
        }
        .working { animation:typing .6s infinite ease-in-out; }

        .snack {
            width:45px; height:45px;
            background-size:contain; background-repeat:no-repeat;
            position:absolute; bottom:155px; right:110px;
            display:none; z-index:15;
        }

        /* ステージ内フードボタン */
        .stage-controls {
            position:absolute; bottom:14px;
            width:100%; display:flex; flex-direction:column;
            align-items:center; gap:8px; z-index:40;
        }
        .menu-popup {
            display:none;
            background:rgba(250,247,242,.97);
            border:1.5px solid var(--warm-mid);
            padding:8px 12px; border-radius:30px;
            box-shadow:var(--shadow); gap:8px;
        }

        /* ===== DASHBOARD ===== */
        .dashboard-panel {
            flex:1;
            background:rgba(255,255,255,.75);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1.5px solid rgba(255,255,255,.9);
            border-radius:var(--radius-lg);
            padding:24px 22px;
            box-shadow:var(--shadow);
            display:flex; flex-direction:column; gap:0;
            height:546px;
            overflow-y:auto;
        }

        /* ===== SECTION HEADER ===== */
        .section-label {
            font-size:10px; font-weight:700; letter-spacing:.12em;
            text-transform:uppercase; color:var(--muted);
            padding-bottom:6px;
            border-bottom:1px solid var(--warm-mid);
            margin-bottom:12px;
        }
        .dash-section { margin-bottom:18px; }

        /* ===== TIMER ===== */
        .timer-block {
            text-align:center;
            background:linear-gradient(135deg, var(--ink) 0%, #2d2d4e 100%);
            border-radius:var(--radius-md);
            padding:16px 10px 12px;
            margin-bottom:18px;
            box-shadow:0 4px 20px rgba(26,26,46,.22);
        }
        .timer-display {
            font-family:'JetBrains Mono', monospace;
            font-size:52px; font-weight:600;
            color:#fff;
            letter-spacing:.04em;
            line-height:1;
        }
        .timer-status {
            font-size:11px; font-weight:700;
            letter-spacing:.08em; text-transform:uppercase;
            color:var(--accent-lt);
            margin-top:6px; height:16px;
        }

        /* ===== BUTTONS ===== */
        .control-group {
            display:flex; gap:8px; justify-content:center;
            margin-bottom:18px;
        }

        button {
            font-family:'Zen Maru Gothic', sans-serif;
            font-size:12px; font-weight:700;
            border:none; border-radius:30px;
            padding:8px 18px;
            cursor:pointer;
            transition:all .18s ease;
            line-height:1;
        }

        .btn-primary {
            background:var(--accent);
            color:#fff;
            box-shadow:0 3px 12px rgba(201,123,75,.35);
        }
        .btn-primary:hover { background:#b5693a; transform:translateY(-1px); box-shadow:0 5px 16px rgba(201,123,75,.4); }

        .btn-secondary {
            background:var(--warm-mid);
            color:var(--ink);
        }
        .btn-secondary:hover { background:#d6ccbf; transform:translateY(-1px); }

        .btn-teal {
            background:var(--teal);
            color:#fff;
            box-shadow:0 3px 12px rgba(61,139,133,.3);
        }
        .btn-teal:hover { background:#2e706a; transform:translateY(-1px); }

        /* stage menu btn */
        .menu-btn {
            background:rgba(255,255,255,.88);
            color:var(--ink);
            border:1.5px solid rgba(255,255,255,.9);
            font-size:11px; font-weight:700;
            padding:7px 16px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }
        .menu-btn:hover { background:#fff; transform:translateY(-1px); }

        button:disabled {
            background:var(--warm-mid) !important;
            color:var(--muted) !important;
            cursor:not-allowed; transform:none !important;
            box-shadow:none !important;
        }

        /* ===== SETTINGS ===== */
        .setting-row {
            display:flex; align-items:center;
            justify-content:space-between;
            font-size:12px; gap:8px;
            color:var(--ink);
            margin-bottom:10px;
        }
        .setting-row label { color:var(--muted); font-size:11px; white-space:nowrap; }

        select, input[type="number"] {
            font-family:'Zen Maru Gothic', sans-serif;
            font-size:12px;
            padding:5px 10px;
            border-radius:6px;
            border:1.5px solid var(--warm-mid);
            background:var(--parchment);
            color:var(--ink);
            outline:none;
        }
        select:focus, input[type="number"]:focus {
            border-color:var(--teal);
        }

        input[type="range"] {
            accent-color:var(--teal);
            height:3px;
        }

        /* ===== PROGRESS LOG ===== */
        .progress-list {
            list-style:none;
            padding:0; margin:0;
            max-height:108px; overflow-y:auto;
            font-size:11px;
        }
        .progress-list li {
            padding:5px 0;
            border-bottom:1px dashed var(--warm-mid);
            color:var(--muted);
        }
        .progress-list:empty::before {
            content:'まだ記録なし';
            color:var(--muted); font-size:11px;
        }

        /* ===== HEART FLOAT ===== */
        @keyframes floatHeart {
            0%  { opacity:1; transform:translateY(0) scale(1); }
            100%{ opacity:0; transform:translateY(-50px) scale(1.4); }
        }
        .float-heart {
            position:absolute; font-size:20px;
            pointer-events:none; z-index:50;
            animation:floatHeart 1.2s ease-out forwards;
        }

        /* ===== DIVIDER ===== */
        .divider {
            border:0; border-top:1px solid var(--warm-mid);
            margin:0 0 18px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width:768px) {
            .main-layout { flex-direction:column; align-items:center; }
            .dashboard-panel { width:340px; height:auto; }
        }

        /* thin scrollbar */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--warm-mid); border-radius:4px; }
    </style>
</head>
<body>

<div class="main-layout">
    <!-- STAGE -->
    <div class="stage-container" id="stage">
        <div id="windowOverlay" class="window-overlay"></div>

        <div id="bubble1" class="speech-bubble"></div>
        <div id="bubble3" class="speech-bubble"></div>

        <div id="chara1" class="character"></div>
        <div id="chara3" class="character"></div>

        <div id="snack" class="snack"></div>

        <div class="stage-controls">
            <div id="menuPopup" class="menu-popup">
                <button class="btn-secondary" onclick="giveFood('snack.png')">🍩 ドーナツ</button>
                <button class="btn-secondary" onclick="giveFood('parfait.png')">🍨 パフェ</button>
            </div>
            <button id="stageMenuBtn" class="menu-btn" onclick="toggleMenu()">ごはんをあげる</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-panel">

        <!-- タイマー本体 -->
        <div class="timer-block">
            <div id="timerDisplay" class="timer-display">25:00</div>
            <div id="timerStatus" class="timer-status">のんびり中</div>
        </div>

        <div class="control-group">
            <button id="startBtn"  class="btn-primary"   onclick="startTimer()">▶ スタート</button>
            <button id="pauseBtn"  class="btn-secondary" onclick="pauseTimer()" disabled>⏸ 停止</button>
            <button id="resetBtn"  class="btn-secondary" onclick="resetTimer()">↺ リセット</button>
        </div>

        <hr class="divider">

        <!-- タイマー設定 -->
        <div class="dash-section">
            <div class="section-label">タイマー設定</div>
            <div class="setting-row">
                <label>モード</label>
                <select id="timerMode" onchange="switchPresetMode()">
                    <option value="pomodoro">ポモドーロ (25分 / 5分)</option>
                    <option value="custom">カスタム手動設定</option>
                </select>
            </div>
            <div id="customSettings" class="setting-row" style="display:none;">
                <label>集中(分) <input type="number" id="customWork"  value="25" min="1" max="180" style="width:48px;"></label>
                <label>休憩(分) <input type="number" id="customBreak" value="5"  min="1" max="60"  style="width:48px;"></label>
            </div>
        </div>

        <!-- 環境音設定 -->
        <div class="dash-section">
            <div class="section-label">環境音 &amp; アラーム</div>
            <div class="setting-row">
                <label>BGM</label>
                <select id="bgmSelect" onchange="changeBGM()">
                    <option value="umi">🌊 波の音</option>
                    <option value="rain">☔ 雨の音</option>
                    <option value="forest">🌲 森の音</option>
                </select>
            </div>
            <div class="setting-row">
                <label>音量</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="adjustVolume()" style="flex:1; margin:0 4px;">
            </div>
            <div class="setting-row">
                <label>アラーム</label>
                <select id="alarmSelect">
                    <option value="alarm1">⏰ デジタル</option>
                    <option value="alarm2">🔔 チャイム</option>
                    <option value="alarm3">✨ キラキラ</option>
                </select>
            </div>
        </div>

        <!-- 進捗ログ -->
        <div class="dash-section" style="margin-bottom:0;">
            <div class="section-label">本日の記録</div>
            <ul id="progressList" class="progress-list"></ul>
        </div>
    </div>
</div>

<audio id="bgm" loop><source src="umi.mp3" type="audio/mpeg"></audio>
<audio id="eatSound"><source src="tabe.mp3" type="audio/mpeg"></audio>
<audio id="dragSound"><source src="sound_drag.mp3" type="audio/mpeg"></audio>
<audio id="dropSound"><source src="sound_drop.mp3" type="audio/mpeg"></audio>
<audio id="chatSound"><source src="sound_chat.mp3" type="audio/mpeg"></audio>
<audio id="alarmSound"></audio>

<script>
// --- タイマーステート ---
let timerInterval   = null;
let isTimerRunning  = false;
let currentPhase    = 'idle';
let timeLeft        = 25 * 60;
let pomodoroSessionCount = 0;

// --- 要素参照 ---
const stage         = document.getElementById('stage');
const windowOverlay = document.getElementById('windowOverlay');
const snackEl       = document.getElementById('snack');
const menuPopup     = document.getElementById('menuPopup');
const stageMenuBtn  = document.getElementById('stageMenuBtn');
const timerDisplay  = document.getElementById('timerDisplay');
const timerStatus   = document.getElementById('timerStatus');
const startBtn      = document.getElementById('startBtn');
const pauseBtn      = document.getElementById('pauseBtn');
const progressList  = document.getElementById('progressList');
const bgm           = document.getElementById('bgm');
const eatSound      = document.getElementById('eatSound');
const dragSound     = document.getElementById('dragSound');
const dropSound     = document.getElementById('dropSound');
const chatSound     = document.getElementById('chatSound');
const alarmSound    = document.getElementById('alarmSound');

let audioUnlocked = false;

// --- キャラクター定義 ---
const charas = [
    { id:1, element:document.getElementById('chara1'), bubble:document.getElementById('bubble1'),
      imgNormal:'chara_normal.png', imgEat:'chara_eat.png', imgSleep:'chara1_sleep.png',
      imgKyaa:'chara1_kyaa.png', imgWork:'chara1_work.png',
      x:60, y:60, direction:1, isReacting:false, isSleeping:false, isDragging:false,
      walkTimer:null, maxY:150, actionType:'walk' },
    { id:3, element:document.getElementById('chara3'), bubble:document.getElementById('bubble3'),
      imgNormal:'chara_death.png', imgEat:'chara_death_eat.png', imgSleep:'chara3_sleep.png',
      imgKyaa:'chara3_kyaa.png', imgWork:'chara3_work.png',
      x:180, y:80, direction:1, isReacting:false, isSleeping:false, isDragging:false,
      walkTimer:null, maxY:220, actionType:'walk' }
];

const chatPhrases = [["📝","🔥"],["🧐","💡"],["☕","🍩"],["💤","⭐"]];

let currentTimeOfDay = -1;
const backgrounds = {
    0:'background_morning.png', 1:'background_day.png',
    2:'background_evening.png', 3:'background_night.png'
};

// --- オーディオ ---
function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    [eatSound, dragSound, dropSound, chatSound, alarmSound].forEach(a => {
        a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
    });
    playCurrentBGM();
}

function playSE(audioEl) {
    if (!audioEl) return;
    unlockAudio();
    audioEl.currentTime = 0;
    audioEl.play().catch(() => {});
}

// --- 時間帯 ---
function getTimeOfDay() {
    const h = new Date().getHours();
    if (h >= 5  && h < 11) return 0;
    if (h >= 11 && h < 17) return 1;
    if (h >= 17 && h < 21) return 2;
    return 3;
}

function updateBackground() {
    const t = getTimeOfDay();
    if (t !== currentTimeOfDay) {
        currentTimeOfDay = t;
        stage.style.backgroundImage = `url('${backgrounds[t]}')`;
        if (t === 3 && currentPhase === 'idle') startNightMode();
        else if (t !== 3) endNightMode();
    }
}

function startNightMode() {
    charas.forEach(c => {
        c.isSleeping = true;
        c.element.style.backgroundImage = `url('${c.imgSleep}')`;
        c.element.classList.add('sleep');
    });
}
function endNightMode() {
    charas.forEach(c => {
        c.isSleeping = false;
        c.element.classList.remove('sleep');
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
    });
}

setInterval(updateBackground, 30000);

// --- キャラクター位置更新 ---
function updatePosition(c, animate) {
    c.element.style.transition = animate ? 'left 1.5s ease-in-out, bottom 1.5s ease-in-out' : 'none';
    c.bubble.style.transition  = animate ? 'left 1.5s ease-in-out, bottom 1.5s ease-in-out' : 'none';
    c.element.style.left   = c.x + 'px';
    c.element.style.bottom = c.y + 'px';

    const scaleFactor = c.isDragging ? 1.0 : 1 - Math.max(0, Math.min(c.y - 40, 110)) / 110 * 0.35;
    c.element.style.setProperty('--chara-dir', c.direction);
    c.element.style.setProperty('--chara-scale', scaleFactor);
    if (!c.element.classList.contains('working')) {
        c.element.style.transform = `scaleX(${c.direction * scaleFactor}) scaleY(${scaleFactor})`;
    }
    c.element.style.zIndex = c.isDragging ? 100 : Math.max(1, 20 - Math.floor(c.y / 10));
    c.bubble.style.left   = (c.x + 5) + 'px';
    c.bubble.style.bottom = (c.y + 90 * scaleFactor) + 'px';
}

function showBubble(c, text) {
    c.bubble.innerText = text;
    c.bubble.style.display = 'block';
}

// --- キャラクターAI ---
function scheduleWalk(c) {
    if (c.walkTimer) return;
    const delay = (currentTimeOfDay === 3 && currentPhase === 'idle')
        ? 6000
        : Math.floor(Math.random() * 2000) + 1500;
    c.walkTimer = setTimeout(() => { c.walkTimer = null; doAction(c); }, delay);
}

function doAction(c) {
    if (c.isReacting || c.isSleeping || c.isDragging) { scheduleWalk(c); return; }

    if (currentPhase === 'work') {
        c.element.style.backgroundImage = `url('${c.imgWork}')`;
        c.element.classList.add('working');
        if (Math.random() < 0.05) { showBubble(c, '✍️…'); setTimeout(() => c.bubble.style.display='none', 1000); }
        scheduleWalk(c); return;
    } else {
        c.element.classList.remove('working');
    }

    const rand = Math.random();
    if (rand < 0.6) {
        c.actionType = 'walk';
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        const newX = Math.floor(Math.random() * 215) + 15;
        let newY = Math.floor(Math.random() * 110) + 40;
        if (c.id === 3) newY = Math.floor(Math.random() * 120) + 100;
        c.direction = (newX < c.x) ? 1 : -1;
        c.x = newX; c.y = newY;
        updatePosition(c, true);
        if (Math.random() < 0.15) checkChat();
    } else if (rand < 0.8) {
        c.actionType = 'stretch';
        showBubble(c, '🎵');
        doPyon(c, () => { c.bubble.style.display = 'none'; });
    } else {
        c.actionType = 'sit';
        c.element.style.backgroundImage = `url('${c.imgEat}')`;
        setTimeout(() => {
            if (!c.isReacting && currentPhase !== 'work')
                c.element.style.backgroundImage = `url('${c.imgNormal}')`;
        }, 1500);
    }

    if (currentTimeOfDay === 3 && currentPhase === 'idle' && Math.random() < 0.3) {
        c.isSleeping = true;
        c.element.style.backgroundImage = `url('${c.imgSleep}')`;
        c.element.classList.add('sleep');
    } else {
        scheduleWalk(c);
    }
}

function checkChat() {
    if (currentPhase === 'work') return;
    const c1 = charas[0], c2 = charas[1];
    if (c1.isReacting || c2.isReacting || c1.isSleeping || c2.isSleeping) return;
    if (Math.abs(c1.x - c2.x) + Math.abs(c1.y - c2.y) >= 120) return;
    c1.isReacting = c2.isReacting = true;
    c1.direction = (c1.x < c2.x) ? -1 : 1;
    c2.direction = (c2.x < c1.x) ? -1 : 1;
    updatePosition(c1, true); updatePosition(c2, true);
    const pair = chatPhrases[Math.floor(Math.random() * chatPhrases.length)];
    playSE(chatSound); showBubble(c1, pair[0]);
    setTimeout(() => { playSE(chatSound); showBubble(c2, pair[1]); }, 700);
    setTimeout(() => {
        c1.bubble.style.display = c2.bubble.style.display = 'none';
        c1.isReacting = c2.isReacting = false;
        scheduleWalk(c1); scheduleWalk(c2);
    }, 2600);
}

// --- タイマー ---
function switchPresetMode() {
    const mode = document.getElementById('timerMode').value;
    document.getElementById('customSettings').style.display = (mode === 'custom') ? 'flex' : 'none';
    if (!isTimerRunning) {
        if (mode === 'pomodoro') { timeLeft = 25 * 60; }
        else syncCustomTime();
        updateTimerDisplay();
    }
}

function syncCustomTime() {
    timeLeft = (parseInt(document.getElementById('customWork').value) || 25) * 60;
    updateTimerDisplay();
}

function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const s = (timeLeft % 60).toString().padStart(2, '0');
    timerDisplay.innerText = `${m}:${s}`;
}

function startTimer() {
    unlockAudio();
    if (isTimerRunning) return;
    isTimerRunning = true;
    startBtn.disabled = true; pauseBtn.disabled = false;
    document.getElementById('timerMode').disabled = true;

    if (currentPhase === 'idle') {
        currentPhase = 'work';
        timerStatus.innerText = 'FOCUS — がんばろう！';
        charas.forEach(c => {
            c.isSleeping = false;
            c.element.classList.remove('sleep');
            c.element.classList.add('working');
            c.element.style.backgroundImage = `url('${c.imgWork}')`;
        });
        stageMenuBtn.disabled = true;
    }

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            isTimerRunning = false;
            onPhaseComplete();
        }
    }, 1000);
}

function pauseTimer() {
    if (!isTimerRunning) return;
    clearInterval(timerInterval);
    isTimerRunning = false;
    startBtn.disabled = false; pauseBtn.disabled = true;
    timerStatus.innerText = 'PAUSED';
}

function resetTimer() {
    clearInterval(timerInterval);
    isTimerRunning = false;
    startBtn.disabled = false; pauseBtn.disabled = true;
    document.getElementById('timerMode').disabled = false;
    stageMenuBtn.disabled = false;
    currentPhase = 'idle';
    timerStatus.innerText = 'のんびり中';
    charas.forEach(c => {
        c.element.classList.remove('working');
        c.element.style.backgroundImage = `url('${c.imgNormal}')`;
    });
    if (document.getElementById('timerMode').value === 'pomodoro') timeLeft = 25 * 60;
    else syncCustomTime();
    updateTimerDisplay();
    updateBackground();
}

function onPhaseComplete() {
    alarmSound.src = `${document.getElementById('alarmSelect').value}.mp3`;
    playSE(alarmSound);
    const now = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    if (currentPhase === 'work') {
        pomodoroSessionCount++;
        addLog(`[${now}] 🎯 集中 #${pomodoroSessionCount} 達成！`);
        currentPhase = 'break';
        timerStatus.innerText = 'BREAK — おつかれさま！';
        charas.forEach(c => {
            c.element.classList.remove('working');
            c.element.style.backgroundImage = `url('${c.imgEat}')`;
            showBubble(c, '🎉 お疲れ様！');
            doPyon(c, () => setTimeout(() => c.bubble.style.display='none', 1500));
        });
        const mode = document.getElementById('timerMode').value;
        const breakMin = (mode === 'pomodoro') ? 5 : (parseInt(document.getElementById('customBreak').value) || 5);
        timeLeft = breakMin * 60;
        stageMenuBtn.disabled = false;
        startTimer();
    } else if (currentPhase === 'break') {
        addLog(`[${now}] ☕ 休憩終了。次の準備をしよう！`);
        resetTimer();
    }
}

function addLog(text) {
    const li = document.createElement('li');
    li.innerText = text;
    progressList.insertBefore(li, progressList.firstChild);
}

// --- BGM ---
const bgmFiles = { umi:'umi.mp3', rain:'rain.mp3', forest:'forest.mp3' };
function changeBGM() {
    const type = document.getElementById('bgmSelect').value;
    windowOverlay.className = 'window-overlay ' + type;
    bgm.src = bgmFiles[type];
    if (audioUnlocked) playCurrentBGM();
}
function playCurrentBGM() {
    bgm.volume = parseFloat(document.getElementById('volumeSlider').value);
    bgm.play().catch(() => {});
}
function adjustVolume() {
    bgm.volume = parseFloat(document.getElementById('volumeSlider').value);
}

// --- インタラクション制限 ---
function isInteractionRestricted() {
    if (currentPhase === 'work') {
        charas.forEach(c => { showBubble(c, '🤫 今は集中！'); setTimeout(() => c.bubble.style.display='none', 1000); });
        return true;
    }
    return false;
}

// --- ステージクリック ---
stage.addEventListener('click', e => {
    if (e.target !== stage) return;
    if (isInteractionRestricted()) return;
    const rect = stage.getBoundingClientRect();
    const tapX = e.clientX - rect.left;
    const tapY = rect.bottom - e.clientY;
    charas.forEach((c, i) => {
        if (c.isDragging) return;
        c.isSleeping = false;
        c.element.classList.remove('sleep');
        c.isReacting = true;
        const offset = (i - 0.5) * 50;
        c.x = Math.max(10, Math.min(tapX + offset, 245));
        c.y = c.id === 3 ? Math.max(100, Math.min(tapY, 220)) : Math.max(40, Math.min(tapY, 150));
        c.direction = (tapX + offset < c.x) ? 1 : -1;
        updatePosition(c, true);
        setTimeout(() => {
            playSE(chatSound);
            showBubble(c, ['✨','🎵'][i]);
            c.isReacting = false;
            setTimeout(() => { c.bubble.style.display='none'; scheduleWalk(c); }, 1200);
        }, 1600);
    });
});

// --- ドラッグ ---
function makeDraggable(chara) {
    let dragging = false;
    let startClientX, startClientY, startCharaX, startCharaY;
    let dragMoved = false;

    function onDragStart(clientX, clientY) {
        if (isInteractionRestricted()) return;
        unlockAudio();
        if (chara.isSleeping) {
            chara.isSleeping = false;
            chara.element.classList.remove('sleep');
            scheduleWalk(chara); return;
        }
        dragging = true; dragMoved = false;
        chara.isDragging = chara.isReacting = true;
        if (chara.walkTimer) { clearTimeout(chara.walkTimer); chara.walkTimer = null; }
        startClientX = clientX; startClientY = clientY;
        startCharaX = chara.x;  startCharaY = chara.y;
        chara.element.style.backgroundImage = `url('${chara.imgKyaa}')`;
        updatePosition(chara, false);
    }

    function onDragMove(clientX, clientY) {
        if (!dragging) return;
        const dx = clientX - startClientX, dy = clientY - startClientY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            if (!dragMoved) playSE(dragSound);
            dragMoved = true;
        }
        chara.x = Math.max(0, Math.min(startCharaX + dx, 255));
        chara.y = Math.max(10, Math.min(startCharaY - dy, 440));
        updatePosition(chara, false);
    }

    function onDragEnd() {
        if (!dragging) return;
        dragging = false;
        chara.isDragging = chara.isReacting = false;
        chara.element.style.backgroundImage = `url('${chara.imgNormal}')`;
        if (dragMoved) {
            const landMax = chara.maxY ?? 150;
            if (chara.y > landMax) chara.y = landMax;
            if (chara.y < 40) chara.y = 40;
            playSE(dropSound);
            showBubble(chara, '💦');
            setTimeout(() => chara.bubble.style.display='none', 1000);
        } else {
            spawnHeart(chara); playSE(chatSound);
        }
        updatePosition(chara, true);
        scheduleWalk(chara);
    }

    chara.element.addEventListener('mousedown',  e => { if(e.button===0){e.preventDefault(); onDragStart(e.clientX, e.clientY);} });
    document.addEventListener('mousemove',        e => { if(dragging) onDragMove(e.clientX, e.clientY); });
    document.addEventListener('mouseup',         () => { if(dragging) onDragEnd(); });
    chara.element.addEventListener('touchstart',  e => { e.preventDefault(); onDragStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    document.addEventListener('touchmove',        e => { if(dragging) onDragMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    document.addEventListener('touchend',        () => { if(dragging) onDragEnd(); });
}

function spawnHeart(c) {
    const h = document.createElement('div');
    h.className = 'float-heart'; h.textContent = '💖';
    h.style.left   = (c.x + 30) + 'px';
    h.style.bottom = (c.y + 80) + 'px';
    stage.appendChild(h);
    setTimeout(() => h.remove(), 1200);
}

function doPyon(c, onFinish) {
    c.element.style.setProperty('--pyon-base', c.y + 'px');
    c.element.classList.add('pyon');
    c.element.addEventListener('animationend', function handler() {
        c.element.classList.remove('pyon');
        c.element.removeEventListener('animationend', handler);
        if (onFinish) onFinish();
    });
}

function toggleMenu() {
    if (isInteractionRestricted()) return;
    menuPopup.style.display = (menuPopup.style.display === 'flex') ? 'none' : 'flex';
}

function giveFood(imgFile) {
    if (isInteractionRestricted()) return;
    menuPopup.style.display = 'none';
    charas.forEach(c => { if(c.walkTimer){clearTimeout(c.walkTimer); c.walkTimer=null;} c.isReacting=true; });
    snackEl.style.backgroundImage = `url('${imgFile}')`; snackEl.style.display = 'block';
    const targets = [{x:100,y:100,dir:-1},{x:180,y:100,dir:1}];
    charas.forEach((c,i) => { c.x=targets[i].x; c.y=targets[i].y; c.direction=targets[i].dir; updatePosition(c,true); });
    setTimeout(() => {
        playSE(eatSound);
        charas.forEach(c => c.element.style.backgroundImage = `url('${c.imgEat}')`);
        snackEl.style.display = 'none';
        setTimeout(() => {
            charas.forEach(c => { c.element.style.backgroundImage=`url('${c.imgNormal}')`; c.isReacting=false; scheduleWalk(c); });
        }, 1500);
    }, 1600);
}

// --- 初期化 ---
charas.forEach(c => {
    c.element.style.backgroundImage = `url('${c.imgNormal}')`;
    updatePosition(c, false);
    makeDraggable(c);
    scheduleWalk(c);
});
updateBackground();
</script>
